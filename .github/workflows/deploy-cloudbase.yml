# Push to main → build and deploy to CloudBase static hosting
name: Deploy CloudBase Static

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: cloudbase-static
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Check secrets present
        env:
          SID: ${{ secrets.TCB_SECRET_ID }}
          SKEY: ${{ secrets.TCB_SECRET_KEY }}
          EID: ${{ secrets.TCB_ENV_ID }}
        run: |
          missing=0
          if [ -z "$SID" ]; then echo "::error::TCB_SECRET_ID is empty"; missing=1; fi
          if [ -z "$SKEY" ]; then echo "::error::TCB_SECRET_KEY is empty"; missing=1; fi
          if [ -z "$EID" ]; then echo "::error::TCB_ENV_ID is empty"; missing=1; fi
          echo "TCB_ENV_ID length=${#EID}"
          exit $missing

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install CloudBase CLI
        run: |
          npm install -g @cloudbase/cli
          tcb -v

      - name: Login CloudBase
        env:
          TCB_SECRET_ID: ${{ secrets.TCB_SECRET_ID }}
          TCB_SECRET_KEY: ${{ secrets.TCB_SECRET_KEY }}
        run: tcb login --apiKeyId "$TCB_SECRET_ID" --apiKey "$TCB_SECRET_KEY"

      # Official CI sample uses /home as static site root
      - name: Deploy hosting
        env:
          TCB_ENV_ID: ${{ secrets.TCB_ENV_ID }}
        run: tcb hosting deploy ./dist /home -e "$TCB_ENV_ID" --concurrency 5 --retry-count 3
